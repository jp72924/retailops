{% load i18n %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% trans "Sign In" %} | RetailOps</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #f8fafc; --bg-elevated: #ffffff; --primary: #4f46e5; --primary-hover: #4338ca;
    --text-primary: #0f172a; --text-secondary: #64748b; --text-tertiary: #94a3b8;
    --border-color: #e2e8f0; --border-input: #cbd5e1; --danger: #ef4444;
    --radius-sm: 8px; --radius-md: 12px; --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06);
    --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.08);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  [data-theme="dark"] {
    --bg-base: #020617; --bg-elevated: #0f172a; --primary: #818cf8; --primary-hover: #a5b4fc;
    --text-primary: #f8fafc; --text-secondary: #94a3b8; --text-tertiary: #64748b;
    --border-color: #1e293b; --border-input: #334155; --danger: #f87171;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg-base); color: var(--text-primary); transition: background 0.3s, color 0.3s; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, var(--bg-base) 0%, #eef2ff 100%); }
  [data-theme="dark"] .login-wrap { background: linear-gradient(135deg, var(--bg-base) 0%, #1e1b4b 100%); }
  .login-card { background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: var(--radius-md); box-shadow: var(--shadow-xl); width: 100%; max-width: 420px; padding: 32px; animation: scaleIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo .brand-icon { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); display: grid; place-items: center; color: #fff; font-size: 22px; font-weight: 800; margin: 0 auto 16px; box-shadow: 0 8px 24px rgba(79,70,229,0.3); }
  .login-logo .brand { font-size: 1.25rem; font-weight: 800; color: var(--text-primary); }
  .login-logo .tagline { font-size: 0.875rem; color: var(--text-secondary); margin-top: 4px; }
  .login-error { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 0.875rem; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  [data-theme="dark"] .login-error { background: #450a0a; border-color: #7f1d1d; color: #fee2e2; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .form-label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.03em; }
  .form-control { padding: 9px 14px; border: 1px solid var(--border-input); border-radius: var(--radius-sm); font-size: 0.875rem; font-family: var(--font); color: var(--text-primary); background: var(--bg-base); width: 100%; transition: all 0.2s; }
  .form-control:focus { outline: none; border-color: var(--primary); background: var(--bg-elevated); box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
  .form-control.is-invalid { border-color: var(--danger); }
  .form-check { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; margin-bottom: 20px; cursor: pointer; }
  .form-check input { accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }
  .btn-submit { display: block; width: 100%; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); padding: 11px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.2s; }
  .btn-submit:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow); }
  .login-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-secondary); }
  .login-lang { text-align: center; margin-top: 16px; }
  .login-lang select { border: 1px solid var(--border-input); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 0.8rem; font-family: var(--font); color: var(--text-primary); background: var(--bg-base); cursor: pointer; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-icon">R</div>
      <h1 class="brand">{% trans "Welcome back" %}</h1>
      <div class="tagline">{% trans "Sign in to RetailOps dashboard" %}</div>
    </div>

    {% if error %}
    <div class="login-error">
      <i class="fas fa-times-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_email">{% trans "Email" %}</label>
        <input type="email" id="id_email" name="email"
          class="form-control{% if error %} is-invalid{% endif %}"
          value="{{ request.POST.email|default:'' }}"
          placeholder="admin@retailops.com"
          autocomplete="email"
          required
          autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">{% trans "Password" %}</label>
        <input type="password" id="id_password" name="password"
          class="form-control{% if error %} is-invalid{% endif %}"
          placeholder="••••••••"
          autocomplete="current-password"
          required>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <label class="form-check" style="margin-bottom:0;">
          <input type="checkbox" name="remember_me" {% if request.POST.remember_me %}checked{% endif %}>
          {% trans "Remember me" %}
        </label>
        <a href="{% url 'password_reset' %}" style="font-size:0.875rem;font-weight:600;">{% trans "Forgot password?" %}</a>
      </div>
      <button type="submit" class="btn-submit">{% trans "Sign In" %}</button>
    </form>



    <form method="post" action="{% url 'set-language' %}" class="login-lang" id="login-lang-form">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.get_full_path }}">
      <select name="language" onchange="document.getElementById('login-lang-form').submit()" aria-label="{% trans 'Language' %}">
        {% get_current_language as CUR_LANG %}
        {% for code, label in LANGUAGES %}
        <option value="{{ code }}" {% if code == CUR_LANG %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </form>
  </div>
</div>
</body>
</html>
