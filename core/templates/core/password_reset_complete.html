{% load i18n %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% trans "Password Reset Complete" %} | RetailOps</title>
<style>
  :root {
    --primary: #2563EB; --secondary: #1E293B;
    --background: #F8FAFC; --surface: #FFFFFF; --text: #0F172A;
    --muted: #64748B; --border: #E2E8F0; --success: #16A34A;
    --radius-sm: 6px; --radius-md: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--background); color: var(--text); }

  .login-wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    width: 100%; max-width: 400px;
    padding: 40px;
    text-align: center;
  }
  .login-logo { margin-bottom: 28px; }
  .login-logo .brand { font-size: 1.75rem; font-weight: 800; color: var(--secondary); }
  .login-logo .brand .dot { color: var(--primary); }
  .login-logo .tagline { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  .success-icon {
    width: 56px; height: 56px;
    background: #DCFCE7; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin: 0 auto 20px;
  }
  h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 10px; }
  .body-text { font-size: 0.875rem; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }

  .btn-signin {
    display: block; width: 100%;
    background: var(--primary); color: #fff;
    border: none; border-radius: var(--radius-sm);
    padding: 10px; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; font-family: var(--font);
    text-decoration: none; text-align: center;
    transition: background 0.15s;
  }
  .btn-signin:hover { background: #1D4ED8; color: #fff; text-decoration: none; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">&#9632;<span class="dot">R</span>etailOps</div>
      <div class="tagline">{% trans "Unified Retail & Order Management" %}</div>
    </div>

    <div class="success-icon">&#10003;</div>
    <h2>{% trans "Password reset successfully" %}</h2>
    <p class="body-text">
      {% trans "Your password has been updated. You can now sign in with your new password." %}
    </p>

    <a href="{% url 'login' %}" class="btn-signin">{% trans "Sign In" %}</a>
  </div>
</div>
</body>
</html>
