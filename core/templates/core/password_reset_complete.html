{% load i18n %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% trans "Password Reset Complete" %} | RetailOps</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg-base:#f8fafc; --bg-elevated:#ffffff; --primary:#4f46e5; --primary-hover:#4338ca; --text-primary:#0f172a; --text-secondary:#64748b; --border-color:#e2e8f0; --success:#10b981; --success-soft:#d1fae5; --radius-sm:8px; --radius-md:12px; --shadow-xl:0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.08); --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  [data-theme="dark"] { --bg-base:#020617; --bg-elevated:#0f172a; --primary:#818cf8; --primary-hover:#a5b4fc; --text-primary:#f8fafc; --text-secondary:#94a3b8; --border-color:#1e293b; --success:#34d399; --success-soft:#064e3b; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg-base);color:var(--text-primary);transition:background 0.3s,color 0.3s}
  a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
  @keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,var(--bg-base) 0%,#eef2ff 100%)}
  [data-theme="dark"] .auth-wrap{background:linear-gradient(135deg,var(--bg-base) 0%,#1e1b4b 100%)}
  .auth-card{background:var(--bg-elevated);border:1px solid var(--border-color);border-radius:var(--radius-md);box-shadow:var(--shadow-xl);width:100%;max-width:420px;padding:40px;animation:scaleIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards;text-align:center}
  .success-icon{width:64px;height:64px;border-radius:50%;background:var(--success-soft);color:var(--success);display:grid;place-items:center;font-size:1.5rem;margin:0 auto 20px}
  .btn-submit{display:block;width:100%;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:11px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all 0.2s;text-decoration:none}
  .btn-submit:hover{background:var(--primary-hover);transform:translateY(-1px)}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="success-icon"><i class="fas fa-check"></i></div>
    <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:8px">{% trans "Password reset successfully" %}</h2>
    <p style="font-size:0.875rem;color:var(--text-secondary);margin-bottom:24px">
      {% trans "Your password has been updated. You can now sign in with your new password." %}
    </p>
    <a href="{% url 'login' %}" class="btn-submit">{% trans "Sign In" %}</a>
  </div>
</div>
</body>
</html>
