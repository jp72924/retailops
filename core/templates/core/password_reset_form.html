{% load i18n %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% trans "Reset Password" %} | RetailOps</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg-base:#f8fafc; --bg-elevated:#ffffff; --primary:#4f46e5; --primary-hover:#4338ca; --text-primary:#0f172a; --text-secondary:#64748b; --border-color:#e2e8f0; --border-input:#cbd5e1; --danger:#ef4444; --radius-sm:8px; --radius-md:12px; --shadow-xl:0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.08); --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  [data-theme="dark"] { --bg-base:#020617; --bg-elevated:#0f172a; --primary:#818cf8; --primary-hover:#a5b4fc; --text-primary:#f8fafc; --text-secondary:#94a3b8; --border-color:#1e293b; --border-input:#334155; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg-base);color:var(--text-primary);transition:background 0.3s,color 0.3s}
  a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
  @keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,var(--bg-base) 0%,#eef2ff 100%)}
  [data-theme="dark"] .auth-wrap{background:linear-gradient(135deg,var(--bg-base) 0%,#1e1b4b 100%)}
  .auth-card{background:var(--bg-elevated);border:1px solid var(--border-color);border-radius:var(--radius-md);box-shadow:var(--shadow-xl);width:100%;max-width:420px;padding:32px;animation:scaleIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards}
  .auth-logo{text-align:center;margin-bottom:28px}
  .auth-logo .brand-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--primary) 0%,#7c3aed 100%);display:grid;place-items:center;color:#fff;font-size:22px;font-weight:800;margin:0 auto 16px;box-shadow:0 8px 24px rgba(79,70,229,0.3)}
  .auth-logo .brand{font-size:1.25rem;font-weight:800;color:var(--text-primary)}
  .auth-logo .tagline{font-size:0.875rem;color:var(--text-secondary);margin-top:4px}
  .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
  .form-label{font-size:0.75rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.03em}
  .form-control{padding:9px 14px;border:1px solid var(--border-input);border-radius:var(--radius-sm);font-size:0.875rem;font-family:var(--font);color:var(--text-primary);background:var(--bg-base);width:100%;transition:all 0.2s}
  .form-control:focus{outline:none;border-color:var(--primary);background:var(--bg-elevated);box-shadow:0 0 0 3px rgba(79,70,229,0.12)}
  .btn-submit{display:block;width:100%;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:11px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all 0.2s}
  .btn-submit:hover{background:var(--primary-hover);transform:translateY(-1px)}
  .auth-footer{text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text-secondary)}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-icon">R</div>
      <div class="brand">{% trans "Reset password" %}</div>
      <div class="tagline">{% trans "Enter your email and we'll send you a reset link" %}</div>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_email">{% trans "Email Address" %}</label>
        <input type="email" id="id_email" name="email" class="form-control" placeholder="you@company.com" required autofocus>
      </div>
      <button type="submit" class="btn-submit">{% trans "Send Reset Link" %}</button>
    </form>
    <div class="auth-footer">
      <a href="{% url 'login' %}">← {% trans "Back to Sign In" %}</a>
    </div>
  </div>
</div>
</body>
</html>
